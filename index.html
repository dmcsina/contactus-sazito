<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ارتباط با ما | پرینتیکو</title>

    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body>

<section class="contact-page">

    <div class="container">

        <div class="contact-header">
            <h1>ارتباط با ما</h1>

            <p>
                اگر سوالی دارید، به مشاوره نیاز دارید یا قصد همکاری با پرینتیکو را دارید،
                از طریق راه‌های زیر با ما در ارتباط باشید.
            </p>
        </div>

        <div class="contact-info">

            <div class="info-card">
                <div class="icon">
                    <i class="fa-solid fa-phone"></i>
                </div>

                <h3>شماره تماس</h3>

                <p>0912-130-1427</p>

                <span>واحد فروش و پشتیبانی</span>
            </div>

            <div class="info-card">
                <div class="icon">
                    <i class="fa-solid fa-envelope"></i>
                </div>

                <h3>ایمیل</h3>

                <p>info@printico.ir</p>

                <span>پاسخگویی در سریع‌ترین زمان</span>
            </div>

            <div class="info-card">
                <div class="icon">
                    <i class="fa-solid fa-location-dot"></i>
                </div>

                <h3>آدرس</h3>

                <p>تهران</p>

                <span>ارسال سفارش به سراسر ایران</span>
            </div>

        </div>


        <div class="contact-content">

            <div class="contact-form">

                <h2>ارسال پیام</h2>

                <form id="contactForm">

                    <div class="input-group">
                        <input type="text" placeholder="نام و نام خانوادگی" required>
                    </div>

                    <div class="input-group">
                        <input type="text" placeholder="شماره تماس" required>
                    </div>

                    <div class="input-group">
                        <input type="email" placeholder="ایمیل">
                    </div>

                    <div class="input-group">
                        <input type="text" placeholder="موضوع پیام">
                    </div>

                    <div class="input-group">
                        <textarea rows="7" placeholder="متن پیام..." required></textarea>
                    </div>

                    <button type="submit">
                        <i class="fa-solid fa-paper-plane"></i>
                        ارسال پیام
                    </button>

                </form>

            </div>


            <div class="map-box">

                <h2>موقعیت ما</h2>

                <iframe
    src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d243.5083302752462!2d48.516386894890374!3d34.79978979641306!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3ff1ecd8325ae087%3A0xc664ec6629c306fe!2z2q_bjNin2YfYp9mGINiv2KfYsdmI24zbjCDYrtiz2LHZiNuM!5e0!3m2!1sen!2s!4v1783153296412!5m2!1sen!2s" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="strict-origin-when-cross-origin"></>"
    width="100%"
    height="450"
    style="border:0; border-radius:20px;"
    allowfullscreen
    loading="lazy"
    referrerpolicy="strict-origin-when-cross-origin">
</iframe> 

            </div>

        </div>

    </div>

</section>

<script src="script.js"></script>

</body>

</html>
